name: Python CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pycodestyle pytest  # 검사에 필요한 패키지 강제 설치

    - name: Run style guide check (PEP 8)
      run: |
        python -m pycodestyle budget_tracker tests

    - name: Run unit tests
      run: |
        python -m pytest